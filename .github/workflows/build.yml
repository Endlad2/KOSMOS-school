name: Build KOSMOS-school

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout KOSMOS-school repository
      uses: actions/checkout@v4
      with:
        repository: Endlad2/KOSMOS-school
        path: KOSMOS-school
    
    - name: Clone Teapot repository into KOSMOS-school
      shell: powershell
      run: |
        # Клонируем Teapot прямо в папку KOSMOS-school
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "Cloning Teapot into KOSMOS-school/Teapot..."
        
        cd KOSMOS-school
        git clone https://github.com/GreenteaOS/Teapot.git
        
        # Проверяем, что папка создалась
        if (Test-Path "Teapot") {
            Write-Host "✓ Teapot folder exists in KOSMOS-school/Teapot"
            Write-Host "Contents of Teapot:"
            Get-ChildItem "Teapot"
        } else {
            Write-Host "✗ Teapot folder not found!"
            exit 1
        }
    
    - name: Download and setup HEXA
      shell: powershell
      run: |
        # Создаем директорию
        New-Item -ItemType Directory -Force -Path C:\HEXA
        
        # Скачиваем HEXA.zip из репозитория
        Write-Host "Downloading HEXA.zip from GitHub..."
        $url = "https://raw.githubusercontent.com/Endlad2/KOSMOS-school/refs/heads/main/.github/HEXA.zip"
        $output = "C:\HEXA\HEXA.zip"
        
        Invoke-WebRequest -Uri $url -OutFile $output -UserAgent "Mozilla/5.0"
        
        # Проверяем, что файл скачался
        if (Test-Path $output) {
            $fileSize = (Get-Item $output).Length
            Write-Host "HEXA.zip downloaded successfully. Size: $fileSize bytes"
            
            # Распаковываем
            Write-Host "Extracting HEXA.zip..."
            Expand-Archive -Path $output -DestinationPath "C:\HEXA" -Force
            
            # Удаляем архив
            Remove-Item $output -Force
            Write-Host "Extraction complete"
            
            # Показываем содержимое
            Write-Host "Contents of C:\HEXA:"
            Get-ChildItem C:\HEXA
        } else {
            Write-Host "Failed to download HEXA.zip"
            exit 1
        }
        
        # Добавляем в PATH
        echo "C:\HEXA" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Host "Added C:\HEXA to PATH"
    
    - name: Download node.exe
      shell: powershell
      run: |
        Write-Host "Downloading node.exe..."
        $nodeUrl = "https://raw.githubusercontent.com/GreenteaOS/Teapot/refs/heads/kawaii/node-v18.1.0-win-x64/node.exe"
        Invoke-WebRequest -Uri $nodeUrl -OutFile "C:\HEXA\node.exe" -UserAgent "Mozilla/5.0"
        
        if (Test-Path "C:\HEXA\node.exe") {
            $fileSize = (Get-Item "C:\HEXA\node.exe").Length
            Write-Host "node.exe downloaded successfully. Size: $fileSize bytes"
        } else {
            Write-Host "Failed to download node.exe"
            exit 1
        }
    
    - name: Verify directory structure
      shell: powershell
      run: |
        Write-Host "=== Checking directory structure ==="
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "Contents of current directory:"
        Get-ChildItem
        
        Write-Host "`nContents of KOSMOS-school:"
        Get-ChildItem KOSMOS-school
        
        Write-Host "`nChecking for Teapot in KOSMOS-school:"
        if (Test-Path "KOSMOS-school/Teapot") {
            Write-Host "✓ Teapot found at KOSMOS-school/Teapot"
            Write-Host "Contents of KOSMOS-school/Teapot:"
            Get-ChildItem "KOSMOS-school/Teapot"
        } else {
            Write-Host "✗ Teapot not found at KOSMOS-school/Teapot"
            exit 1
        }
        
        Write-Host "`nChecking for src directory:"
        if (Test-Path "KOSMOS-school/src") {
            Write-Host "✓ src directory found"
        } else {
            Write-Host "✗ src directory not found"
            exit 1
        }
    
    - name: Run build script
      shell: powershell
      working-directory: KOSMOS-school/src
      run: |
        Write-Host "Current directory: $(Get-Location)"
        Write-Host "Looking for Teapot in parent directory: $(Get-Location)\..\Teapot"
        
        # Проверяем наличие Teapot перед запуском
        if (Test-Path "..\Teapot") {
            Write-Host "✓ Teapot found at ..\Teapot"
            Write-Host "Contents of Teapot directory:"
            Get-ChildItem "..\Teapot"
            
            Write-Host "`nRunning build.js..."
            & "C:\HEXA\node.exe" build.js
            if ($LASTEXITCODE -ne 0) {
                Write-Host "Build failed with exit code $LASTEXITCODE"
                exit $LASTEXITCODE
            }
            Write-Host "Build completed successfully!"
        } else {
            Write-Host "✗ Teapot not found at ..\Teapot"
            Write-Host "This is required for the build to work"
            Write-Host "Contents of parent directory (..):"
            Get-ChildItem ..
            exit 1
        }
    
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: KOSMOS-school/dist/
        retention-days: 7
        if-no-files-found: warn
