name: Build KOSMOS-school

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout KOSMOS-school repository
      uses: actions/checkout@v4
      with:
        repository: Endlad2/KOSMOS-school
        path: KOSMOS-school
    
    - name: Clone Teapot repository
      shell: powershell
      run: |
        cd ..
        git clone https://github.com/GreenteaOS/Teapot.git
    
    - name: Download and setup HEXA
      shell: powershell
      run: |
        # Создаем директорию
        New-Item -ItemType Directory -Force -Path C:\HEXA
        
        # Скачиваем архив
        Invoke-WebRequest -Uri "https://эндлад.рф/HEXA.zip" -OutFile "C:\HEXA\HEXA.zip"
        
        # Распаковываем
        Expand-Archive -Path "C:\HEXA\HEXA.zip" -DestinationPath "C:\HEXA" -Force
        
        # Удаляем архив
        Remove-Item "C:\HEXA\HEXA.zip"
        
        # Добавляем в PATH
        echo "C:\HEXA" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Download node.exe
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/GreenteaOS/Teapot/refs/heads/kawaii/node-v18.1.0-win-x64/node.exe" -OutFile "C:\HEXA\node.exe"
    
    - name: Verify installations
      shell: powershell
      run: |
        Write-Host "Checking PATH:"
        $env:Path
        Write-Host "Checking node:"
        Get-Command node
        node --version
    
    - name: Run build script
      shell: powershell
      working-directory: KOSMOS-school/src
      run: node build.js
    
    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: KOSMOS-school/dist/
        retention-days: 7
